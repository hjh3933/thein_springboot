spring.application.name=jpa-member-1

# ========== DB 연결
spring.datasource.url=jdbc:postgresql://localhost:5432/hrd
spring.datasource.username=postgres
spring.datasource.password=1234

# ========== JPA 설정
# 애플리케이션 실행 시 Entity를 기준으로 테이블을 자동 생성(또는 수정)
# create      : 기존 테이블 삭제 후 새로 생성
# create-drop : 실행 시 생성, 종료 시 삭제
# update      : 변경된 내용만 반영(테스트용)
# validate    : Entity와 테이블 구조만 검증
# none        : 자동 생성 기능 사용 안 함

# Entity 클래스를 기준으로 테이블을 자동 생성 또는 수정
spring.jpa.hibernate.ddl-auto=update

# 실행되는 SQL 출력
spring.jpa.show-sql=true

# SQL 보기 좋게 출력
spring.jpa.properties.hibernate.format_sql=true

# CamelCase → snake_case 변환
# MemberEntity → member_entity
# memberName → member_name
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Swagger UI 주소(http://localhost:8080/swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger

# API 문서를 알파벳순으로 정렬
springdoc.swagger-ui.operationsSorter=alpha

# Controller 이름순으로 정렬
springdoc.swagger-ui.tagsSorter=alpha

# 기본 URL(http://localhost:8080/api-docs)
springdoc.api-docs.path=/api-docs